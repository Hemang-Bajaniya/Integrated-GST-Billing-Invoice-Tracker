    <div class="container mt-5 pt-4">

        <section>
            <h2 class="mb-4">Customer Management</h2>

            <div class="card">
                <div class="card-header">
                    Customer List
                    <button class="btn btn-sm btn-light float-end" id="addCustomerBtn">+ Add Customer</button>
                </div>

                <div class="card-body">

                    <div id="customerForm" class="invoice-form mb-3">
                        <form id="customerFormEl">
                            <div class="row">

                                <!-- Customer Name -->
                                <div class="col-md-6 mb-2">
                                    <input type="text" id="custName" class="form-control" placeholder="Customer Name"
                                        required minlength="3">
                                    <div class="invalid-feedback">
                                        Customer name must be at least 3 characters.
                                    </div>
                                </div>

                                <!-- Email -->
                                <div class="col-md-6 mb-2">
                                    <input type="email" id="custEmail" class="form-control" placeholder="Email"
                                        required>
                                    <div class="invalid-feedback">
                                        Please enter a valid email address.
                                    </div>
                                </div>

                                <!-- Phone -->
                                <div class="col-md-6 mb-2">
                                    <input type="text" id="custPhone" class="form-control" placeholder="Phone" required>
                                    <div class="invalid-feedback">  
                                        Phone number must be exactly 10 digits.
                                    </div>
                                </div>

                                <!-- Address -->
                                <div class="col-md-12 mb-2">
                                    <input type="text" id="custAddress" class="form-control" placeholder="Address"
                                        required minlength="5">
                                    <div class="invalid-feedback">
                                        Address must be at least 5 characters.
                                    </div>
                                </div>

                                <!-- Buttons -->
                                <div class="col-12">
                                    <button type="submit" class="btn btn-primary" id="saveCustomer">
                                        Save
                                    </button>
                                    <button type="button" class="btn btn-secondary" id="cancelCustomer">
                                        Cancel
                                    </button>
                                </div>

                            </div>
                        </form>
                    </div>


                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="customerTable"></tbody>
                    </table>

                </div>
            </div>
        </section>

    </div>
