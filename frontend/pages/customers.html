<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Customer Management</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">GST Billing - Customers</a>
        </div>
    </nav>

    <div class="container mt-5 pt-4">

        <section>
            <h2 class="mb-4">Customer Management</h2>

            <div class="card">
                <div class="card-header">
                    Customer List
                    <button class="btn btn-sm btn-light float-end" id="addCustomerBtn">+ Add Customer</button>
                </div>

                <div class="card-body">

                    <div id="customerForm" class="invoice-form mb-3">
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <input type="text" id="custName" class="form-control" placeholder="Customer Name">
                            </div>
                            <div class="col-md-6 mb-2">
                                <input type="email" id="custEmail" class="form-control" placeholder="Email">
                            </div>
                            <div class="col-md-6 mb-2">
                                <input type="text" id="custPhone" class="form-control" placeholder="Phone">
                            </div>
                            <div class="col-md-12 mb-2">
                                <input type="text" id="custAddress" class="form-control" placeholder="Address">
                            </div>
                            <div class="col-12">
                                <button class="btn btn-primary" id="saveCustomer">Save</button>
                                <button class="btn btn-secondary" id="cancelCustomer">Cancel</button>
                            </div>
                        </div>
                    </div>

                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="customerTable"></tbody>
                    </table>

                </div>
            </div>
        </section>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
    <script src="../js/customers.js" type="module"></script>
</body>

</html>
