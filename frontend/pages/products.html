<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>

<body>

    <div id="navbar"></div>

    <div class="container mt-5 pt-4">
        <section>
            <h2 class="mb-4">Product Management</h2>

            <div class="card">
                <div class="card-header">
                    Product List
                    <button class="btn btn-sm btn-light float-end" id="addProductBtn">+ Add Product</button>
                </div>

                <div class="card-body">

                    <form id="productFormEl" class="invoice-form mb-3">
                        <div class="row">

                            <div class="col-md-4 mb-2">
                                <input type="text" id="prodName" name="prodName" class="form-control"
                                    placeholder="Product Name">
                            </div>

                            <div class="col-md-4 mb-2">
                                <input type="number" id="prodPrice" name="prodPrice" class="form-control"
                                    placeholder="Unit Price">
                            </div>

                            <div class="col-md-4 mb-2">
                                <select id="prodTax" name="prodTax" class="form-select">
                                    <option value="">Select GST</option>
                                    <option>5%</option>
                                    <option>12%</option>
                                    <option selected>18%</option>
                                    <option>28%</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <button type="submit" class="btn btn-primary" id="saveProduct">Save</button>
                                <button type="button" class="btn btn-secondary" id="cancelProduct">Cancel</button>
                            </div>
                        </div>
                    </form>

                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Product</th>
                                <th>Price</th>
                                <th>GST</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="productTable"></tbody>
                    </table>

                </div>
            </div>
        </section>
    </div>

    <script src="../components/navbar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>
    <script src="../modules/products.js" type="module"></script>

</body>

</html>
